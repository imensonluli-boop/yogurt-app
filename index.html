<!DOCTYPE html>
<html>
<head>
  <title>Yogurt App PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; padding: 20px; background:#f5f5f5 }
    input, button, select { margin: 5px; padding: 10px; }
    .card { background:white; border-radius:10px; padding:10px; margin-top:10px }
  </style>
</head>
<body>

<h1>🥣 Yogurt App PRO</h1>

<h3>➕ Producto</h3>
<input id="nombre" placeholder="Nombre">
<input id="precio" type="number" placeholder="Precio">
<input id="stock" type="number" placeholder="Stock">
<button onclick="agregarProducto()">Agregar</button>

<h3>👤 Cliente</h3>
<input id="clienteNombre" placeholder="Nombre cliente">
<button onclick="agregarCliente()">Agregar</button>

<select id="clienteSelect"></select>
<input id="direccion" placeholder="Dirección">

<h3>🛒 Productos</h3>
<div id="productos"></div>

<h3>📦 Pedidos</h3>
<div id="ventas"></div>

<h3>💰 Resumen</h3>
<p id="resumen"></p>

<script>
let productos = JSON.parse(localStorage.getItem("productos")) || [];
let ventas = JSON.parse(localStorage.getItem("ventas")) || [];
let clientes = JSON.parse(localStorage.getItem("clientes")) || [];

function guardar() {
  localStorage.setItem("productos", JSON.stringify(productos));
  localStorage.setItem("ventas", JSON.stringify(ventas));
  localStorage.setItem("clientes", JSON.stringify(clientes));
}

function agregarProducto() {
  const nombre = nombreInput.value;
  const precio = +precioInput.value;
  const stock = +stockInput.value;
  productos.push({ nombre, precio, stock, vendidos:0 });
  guardar(); render();
}

function agregarCliente() {
  const nombre = clienteNombre.value;
  clientes.push(nombre);
  guardar(); render();
}

function vender(i) {
  let cantidad = prompt("Cantidad?");
  cantidad = +cantidad;

  if(productos[i].stock < cantidad) return alert("No hay stock");

  productos[i].stock -= cantidad;
  productos[i].vendidos += cantidad;

  const cliente = clienteSelect.value || "Sin nombre";
  const direccion = document.getElementById("direccion").value;

  const venta = {
    producto: productos[i].nombre,
    cantidad,
    total: productos[i].precio * cantidad,
    cliente,
    direccion,
    estado:"Pendiente"
  };

  ventas.push(venta);
  guardar(); render();
}

function cambiarEstado(i){
  ventas[i].estado = ventas[i].estado==="Pendiente"?"Entregado":"Pendiente";
  guardar(); render();
}

function whatsapp(v){
  const msg = `Pedido:\\n${v.producto} x${v.cantidad}\\nTotal $${v.total}\\nDirección: ${v.direccion}`;
  window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

function render(){
  productosDiv.innerHTML="";
  ventasDiv.innerHTML="";
  clienteSelect.innerHTML="<option value=''>Seleccionar cliente</option>";

  let total=0;

  clientes.forEach(c=>{
    clienteSelect.innerHTML += `<option>${c}</option>`;
  });

  productos.forEach((p,i)=>{
    let alerta = p.stock<5 ? "⚠️ Poco stock" : "";
    productosDiv.innerHTML += `
      <div class='card'>
        ${p.nombre} - $${p.precio} (Stock: ${p.stock}) ${alerta}
        <br>
        <button onclick='vender(${i})'>Vender</button>
      </div>
    `;
  });

  ventas.forEach((v,i)=>{
    total += v.total;
    ventasDiv.innerHTML += `
      <div class='card'>
        ${v.producto} x${v.cantidad} - $${v.total}<br>
        ${v.cliente} - ${v.direccion}<br>
        Estado: ${v.estado}<br>
        <button onclick='cambiarEstado(${i})'>Cambiar estado</button>
        <button onclick='whatsapp(${i})'>WhatsApp</button>
      </div>
    `;
  });

  resumen.innerHTML = `Ventas totales: $${total}`;
}

render();
</script>

</body>
</html>
