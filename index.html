<!DOCTYPE html>
<html>
<head>
  <title>Yogurt App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; padding: 20px; }
    input, button { margin: 5px; padding: 10px; }
    .card { border: 1px solid #ccc; padding: 10px; margin-top: 10px; border-radius: 10px; }
  </style>
</head>
<body>

<h1>Yogurt App 🥣</h1>

<h3>Agregar producto</h3>
<input id="nombre" placeholder="Nombre">
<input id="precio" type="number" placeholder="Precio">
<input id="stock" type="number" placeholder="Stock">
<button onclick="agregarProducto()">Agregar</button>

<h3>Productos</h3>
<div id="productos"></div>

<h3>Ventas</h3>
<div id="ventas"></div>

<script>
let productos = JSON.parse(localStorage.getItem("productos")) || [];
let ventas = JSON.parse(localStorage.getItem("ventas")) || [];

function guardar() {
  localStorage.setItem("productos", JSON.stringify(productos));
  localStorage.setItem("ventas", JSON.stringify(ventas));
}

function agregarProducto() {
  const nombre = document.getElementById("nombre").value;
  const precio = +document.getElementById("precio").value;
  const stock = +document.getElementById("stock").value;

  productos.push({ nombre, precio, stock });
  guardar();
  render();
}

function vender(i) {
  if (productos[i].stock <= 0) return alert("Sin stock");

  productos[i].stock--;
  ventas.push(productos[i]);

  guardar();
  render();
}

function render() {
  const prodDiv = document.getElementById("productos");
  const ventDiv = document.getElementById("ventas");

  prodDiv.innerHTML = "";
  ventDiv.innerHTML = "";

  productos.forEach((p, i) => {
    prodDiv.innerHTML += `
      <div class="card">
        ${p.nombre} - $${p.precio} (Stock: ${p.stock})
        <br>
        <button onclick="vender(${i})">Vender</button>
      </div>
    `;
  });

  ventas.forEach(v => {
    ventDiv.innerHTML += `
      <div class="card">
        ${v.nombre} - $${v.precio}
      </div>
    `;
  });
}

render();
</script>

</body>
</html>
